<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create a new account on ComplaintDesk to register and track your complaints.">
  <title>Register — ComplaintDesk</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar" id="navbar">
    <div class="container">
      <a href="/" class="nav-brand">
        <span class="brand-icon">📋</span>
        ComplaintDesk
      </a>
      <div class="nav-links" id="navLinks">
        <a href="/">Home</a>
        <a href="/about.html">About</a>
        <a href="/login.html" class="btn-nav-outline">Login</a>
        <a href="/register.html" class="btn-nav active">Register</a>
      </div>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- Register Form -->
  <section class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-icon">👤</div>
        <h2>Create Account</h2>
        <p>Join ComplaintDesk to start raising complaints</p>
      </div>

      <div class="alert" id="alertBox"></div>

      <form id="registerForm" novalidate>
        <div class="form-group">
          <label for="fullName">Full Name</label>
          <input type="text" id="fullName" name="fullName" class="form-control" placeholder="Enter your full name" required>
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" class="form-control" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" name="phone" class="form-control" placeholder="10-digit phone number" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" class="form-control" placeholder="Min. 6 characters" required minlength="6">
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" name="confirmPassword" class="form-control" placeholder="Re-enter your password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px;" id="registerBtn">
          Create Account
        </button>
      </form>

      <p style="text-align:center;margin-top:24px;font-size:0.9rem;color:var(--gray-500);">
        Already have an account? <a href="/login.html" style="color:var(--primary-600);font-weight:600;">Login here</a>
      </p>
    </div>
  </section>

  <script src="/js/navbar.js"></script>
  <script src="/js/register.js"></script>
</body>
</html>
