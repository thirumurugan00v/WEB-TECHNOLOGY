<!DOCTYPE html>
<html>
<head>
<title>Login Page</title>

<style>

body{
margin:0;
font-family:Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#667eea,#764ba2,#ff9966);
}

.login-box{
background:white;
padding:35px;
width:320px;
border-radius:15px;
text-align:center;
box-shadow:0px 0px 20px rgba(0,0,0,0.3);
}

h2{
margin-bottom:20px;
}

input{
width:90%;
padding:10px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
background:#667eea;
color:white;
border:none;
padding:10px 20px;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#5a67d8;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Admin Login</h2>

<form action="LoginServlet" method="post">

<input type="text" name="username" placeholder="Enter Username" required><br>

<input type="password" name="password" placeholder="Enter Password" required><br>

<br>

<button type="submit">Login</button>

</form>

</div>

</body>
</html>
